name: Validate Release Checklist

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - deploy-prod

jobs:
  validate-release-checklist:
    name: validate-release-checklist
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check all checklist items are ticked
        uses: actions/github-script@v7
        with:
          script: |
            // Fetch live PR body from API so manual re-runs see current state
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const targetBranch = pr.base.ref;

            // Normalize line endings (GitHub API returns \r\n on Windows)
            const body = (pr.body || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');

            // Empty PR body
            if (!body.trim()) {
              core.setFailed(
                `❌ PR description is empty.\n` +
                `PRs targeting "${targetBranch}" must use the release checklist template.\n` +
                `Use this link to open your PR:\n` +
                `https://github.com/heizenrader/caffeine-package/compare/${targetBranch}...YOUR-BRANCH?template=release.md&expand=1`
              );
              return;
            }

            const uncheckedItems = body.match(/^- \[ \]/gm) || [];
            const checkedItems   = body.match(/^- \[[xX]\]/gm) || [];
            const totalItems     = uncheckedItems.length + checkedItems.length;

            // No checkboxes found at all — template was not used
            if (totalItems === 0) {
              core.setFailed(
                `❌ No checklist items found in PR description.\n` +
                `PRs targeting "${targetBranch}" must use the release checklist template.\n` +
                `Use this link to open your PR:\n` +
                `https://github.com/heizenrader/caffeine-package/compare/${targetBranch}...YOUR-BRANCH?template=release.md&expand=1`
              );
              return;
            }

            console.log(`📋 Checklist: ${checkedItems.length} / ${totalItems} items checked`);

            if (uncheckedItems.length > 0) {
              const lines = body.split('\n');
              const uncheckedLines = lines
                .filter(l => /^- \[ \]/.test(l))
                .map(l => `  ${l.trim()}`)
                .join('\n');

              core.setFailed(
                `❌ Release checklist is incomplete.\n` +
                `${uncheckedItems.length} item(s) still need to be checked before this PR can merge:\n\n` +
                `${uncheckedLines}\n\n` +
                `Push an empty commit or re-run this check once all boxes are ticked.`
              );
            } else {
              console.log('✅ All checklist items are checked. Good to go!');
            }

      - name: Validate package.json version matches CHANGELOG
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // --- Locate package.json ---
            let pkgPath = null;
            for (const candidate of ['package.json', 'Assets/package.json', 'Packages/package.json']) {
              if (fs.existsSync(candidate)) {
                pkgPath = candidate;
                break;
              }
            }
            if (!pkgPath) {
              core.setFailed('❌ Could not locate package.json — make sure it exists at the repo root or under Assets/ or Packages/.');
              return;
            }

            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            const pkgVersion = pkg.version;
            console.log(`package.json version: ${pkgVersion}`);

            // --- Validate CHANGELOG contains an entry for this version ---
            let changelogPath = null;
            for (const candidate of ['CHANGELOG.md', 'Assets/CHANGELOG.md', 'CHANGELOG']) {
              if (fs.existsSync(candidate)) {
                changelogPath = candidate;
                break;
              }
            }

            if (!changelogPath) {
              core.setFailed('❌ No CHANGELOG.md found — make sure it exists at the repo root or under Assets/.');
              return;
            }

            const changelog = fs.readFileSync(changelogPath, 'utf8');
            const escaped = pkgVersion.replace(/\./g, '\\.');
            const headerRegex = new RegExp(`^## \\[${escaped}\\]`, 'm');

            if (!headerRegex.test(changelog)) {
              core.setFailed(
                `❌ CHANGELOG.md does not contain a release header for version "${pkgVersion}".\n` +
                `Add a section like:\n\n` +
                `  ## [${pkgVersion}] - YYYY-MM-DD\n\n` +
                `  ### Added\n  - ...\n`
              );
            } else {
              console.log(`✅ CHANGELOG.md contains an entry for version ${pkgVersion}.`);
            }

      - name: Validate package.json version matches git tag (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let pkgPath = null;
            for (const candidate of ['package.json', 'Assets/package.json', 'Packages/package.json']) {
              if (fs.existsSync(candidate)) {
                pkgPath = candidate;
                break;
              }
            }
            if (!pkgPath) {
              core.setFailed('❌ Could not locate package.json — skipping version/tag comparison.');
              return;
            }

            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            const pkgVersion = pkg.version;
            const tagVersion = context.ref.replace('refs/tags/', '').replace(/^v/, '');

            console.log(`package.json version : ${pkgVersion}`);
            console.log(`Git tag version      : ${tagVersion}`);

            if (pkgVersion !== tagVersion) {
              core.setFailed(
                `❌ Version mismatch!\n` +
                `package.json says "${pkgVersion}" but the git tag is "${tagVersion}".\n` +
                `Update package.json (or the tag) so they match before publishing.`
              );
            } else {
              console.log('✅ package.json version matches the git tag.');
            }