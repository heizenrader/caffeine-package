name: Validate Release Checklist

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - main
      - release
      - release/**

jobs:
  validate-checklist:
    name: validate-release-checklist
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Check all checklist items are ticked
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // Only run this validation on PRs that use the release template.
            // We detect it by the presence of the sentinel header.
            const isReleaseTemplate = body.includes('Package Release Checklist');
            if (!isReleaseTemplate) {
              console.log('ℹ️  This PR does not use the release template — skipping checklist validation.');
              return;
            }

            // Match every GitHub-flavoured Markdown task list item.
            // - Unchecked: "- [ ]"
            // - Checked:   "- [x]" or "- [X]"
            const uncheckedPattern = /^- \[ \]/gm;
            const checkedPattern   = /^- \[[xX]\]/gm;

            const uncheckedItems = body.match(uncheckedPattern) || [];
            const checkedItems   = body.match(checkedPattern)   || [];

            const totalItems  = uncheckedItems.length + checkedItems.length;
            const missingCount = uncheckedItems.length;

            console.log(`📋 Checklist: ${checkedItems.length} / ${totalItems} items checked`);

            if (missingCount > 0) {
              // Build a helpful list of the unchecked items for the failure message.
              const lines = body.split('\n');
              const uncheckedLines = lines
                .filter(l => /^- \[ \]/.test(l))
                .map(l => `  ${l.trim()}`)
                .join('\n');

              core.setFailed(
                `❌ Release checklist is incomplete.\n` +
                `${missingCount} item(s) still need to be checked before this PR can merge:\n\n` +
                `${uncheckedLines}\n\n` +
                `Please tick every checkbox in the PR description, then the check will re-run automatically.`
              );
            } else {
              console.log('✅ All checklist items are checked. Good to go!');
            }

      - name: Validate package.json version matches git tag (if tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Find package.json — handle both root-level and Assets/ sub-folder layouts
            let pkgPath = null;
            for (const candidate of ['package.json', 'Assets/package.json', 'Packages/package.json']) {
              if (fs.existsSync(candidate)) {
                pkgPath = candidate;
                break;
              }
            }
            if (!pkgPath) {
              core.warning('⚠️  Could not locate package.json — skipping version/tag comparison.');
              return;
            }

            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            const pkgVersion = pkg.version;

            // Strip the leading "v" from the tag name if present (v1.2.3 → 1.2.3)
            const tagVersion = context.ref.replace('refs/tags/', '').replace(/^v/, '');

            console.log(`package.json version : ${pkgVersion}`);
            console.log(`Git tag version      : ${tagVersion}`);

            if (pkgVersion !== tagVersion) {
              core.setFailed(
                `❌ Version mismatch!\n` +
                `package.json says "${pkgVersion}" but the git tag is "${tagVersion}".\n` +
                `Update package.json (or the tag) so they match before publishing.`
              );
            } else {
              console.log('✅ package.json version matches the git tag.');
            }

      - name: Validate CHANGELOG entry exists for this version
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // Extract the declared version from the PR body summary table
            const versionMatch = body.match(/\*\*Version being released:\*\*\s*<!--.*?-->\s*([^\s\n]+)/);
            if (!versionMatch) {
              console.log('ℹ️  Could not detect version from PR body — skipping CHANGELOG check.');
              return;
            }
            const declaredVersion = versionMatch[1].replace(/^v/, '');
            console.log(`Declared version in PR body: ${declaredVersion}`);

            // Locate CHANGELOG
            let changelogPath = null;
            for (const candidate of ['CHANGELOG.md', 'Assets/CHANGELOG.md', 'CHANGELOG']) {
              if (fs.existsSync(candidate)) {
                changelogPath = candidate;
                break;
              }
            }
            if (!changelogPath) {
              core.warning('⚠️  No CHANGELOG.md found — skipping version entry check.');
              return;
            }

            const changelog = fs.readFileSync(changelogPath, 'utf8');
            // Keep-a-Changelog style header: ## [1.2.3] or ## [1.2.3] - 2024-01-01
            const headerRegex = new RegExp(`^## \\[${declaredVersion.replace('.', '\\.').replace('.', '\\.')}\\]`, 'm');

            if (!headerRegex.test(changelog)) {
              core.setFailed(
                `❌ CHANGELOG.md does not contain a release header for version "${declaredVersion}".\n` +
                `Add a section like:\n\n` +
                `  ## [${declaredVersion}] - YYYY-MM-DD\n\n` +
                `  ### Added\n  - ...\n`
              );
            } else {
              console.log(`✅ CHANGELOG.md contains an entry for version ${declaredVersion}.`);
            }
